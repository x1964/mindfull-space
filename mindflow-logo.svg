<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient متطابق مع ألوان الموقع -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec489a"/>
    </linearGradient>

    <!-- Glow ناعم ومتناسق -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feMerge>
        <feMergeNode in="offsetblur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow للإضافة -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- خلفية شفافة مع تأثير زجاجي -->
  <rect x="4" y="4" width="64" height="64" rx="20"
        fill="var(--glass-bg, rgba(255,255,255,0.1))"
        stroke="url(#brandGrad)"
        stroke-width="1.5"
        filter="url(#dropShadow)"/>

  <!-- الإطار الرئيسي -->
  <rect x="8" y="8" width="56" height="56" rx="18"
        stroke="url(#brandGrad)"
        stroke-width="2.5"
        fill="none"
        stroke-linecap="round"/>

  <!-- المسار المتدفق -->
  <path d="M16 42
           C24 20, 34 20, 42 38
           S54 52, 56 30"
        stroke="url(#brandGrad)"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
        filter="url(#softGlow)"/>

  <!-- النقاط الرئيسية -->
  <circle cx="16" cy="42" r="3.5"
          fill="url(#brandGrad)"
          stroke="white"
          stroke-width="1.5"
          filter="url(#softGlow)"/>
  <circle cx="42" cy="38" r="3.5"
          fill="url(#brandGrad)"
          stroke="white"
          stroke-width="1.5"
          filter="url(#softGlow)"/>
  <circle cx="56" cy="30" r="3.5"
          fill="url(#brandGrad)"
          stroke="white"
          stroke-width="1.5"
          filter="url(#softGlow)"/>

  <!-- نقاط صغيرة متحركة -->
  <circle cx="28" cy="28" r="2"
          fill="#6366f1"
          opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="48" r="2"
          fill="#ec489a"
          opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
</svg>
