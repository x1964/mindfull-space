<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>MindfulSpace</title>
    <link rel="shortcut icon" href="mindflow-logo.svg" type="image/x-icon">
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================
           SECTION 1: المتغيرات الأساسية (CSS Variables)
           ============================================ */
        :root {
            /* الألوان الرئيسية */
            --primary: #6366f1;
            --secondary: #ec489a;
            --tertiary: #8b5cf6;
            --pomodoro-color: #f97316;
            --break-color: #22c55e;

            /* ألوان الخلفية */
            --bg-start: #f8fafc;
            --bg-end: #eef2ff;

            /* ألوان النصوص */
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --text-light: #94a3b8;

            /* تأثيرات الزجاج */
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(0, 0, 0, 0.08);

            /* الظلال */
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);

            /* ألوان الحالات */
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --info: #3b82f6;

            /* مسافات الأمان للهواتف */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* الوضع الليلي */
        [data-theme="dark"] {
            --bg-start: #0f172a;
            --bg-end: #1e293b;
            --glass-bg: rgba(30, 41, 59, 0.94);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dark: #f1f5f9;
            --text-gray: #94a3b8;
            --text-light: #64748b;
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        /* ============================================
           SECTION 2: الإعدادات العامة
           ============================================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-dark);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            user-select: none;
        }

        /* شريط التمرير المخصص */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        /* ============================================
           SECTION 3: شريط التنقل (Navbar)
           ============================================ */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            pointer-events: none;
            padding: calc(12px + var(--safe-top)) 16px 0 16px;
        }

        .navbar {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: var(--shadow-sm);
            position: relative;
        }

        .navbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            border-radius: 28px 28px 0 0;
        }

        /* الشعار */
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .brand svg {
            width: 33px;
            height: 33px;
        }

        .brand span {
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 480px) {
            .brand span {
                display: none;
            }
        }

        /* مربع البحث */
        .search-box {
            flex: 1;
            max-width: 240px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 8px 32px 8px 12px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-dark);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
        }

        .search-box input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .search-box {
                max-width: 160px;
            }
        }

        /* أدوات التحكم */
        .tools {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-gray);
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tool-btn:active {
            transform: scale(0.95);
            background: var(--primary);
            color: white;
        }

        .tool-btn.active {
            background: var(--primary);
            color: white;
        }

        /* ============================================
           SECTION 4: زر الإجراءات العائم (FAB)
           ============================================ */
        .fab-container {
            position: fixed;
            bottom: calc(24px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .fab-main {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--tertiary));
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: grid;
            place-items: center;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            transition: all 0.3s;
        }

        .fab-main:active {
            transform: scale(0.95);
        }

        .fab-main.active {
            transform: rotate(45deg);
            background: linear-gradient(135deg, var(--secondary), #f472b6);
        }

        /* قائمة الخيارات */
        .fab-options {
            display: flex;
            flex-direction: row;
            gap: 8px;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.3s;
        }

        .fab-container.open .fab-options {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .fab-item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-dark);
            transition: all 0.2s;
        }

        .fab-item:active {
            transform: translateY(-4px);
            background: var(--primary);
            color: white;
        }

        .fab-item i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .fab-item:active i {
            color: white;
        }

        @media (max-width: 500px) {
            .fab-options {
                flex-direction: column;
                position: absolute;
                bottom: 70px;
                left: 50%;
                transform: translateX(-50%) translateY(20px);
            }
            .fab-container.open .fab-options {
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ============================================
           SECTION 5: منطقة العمل (Canvas)
           ============================================ */
        #viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: grab;
            background-image:
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 30px 30px;
            position: relative;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #world {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            width: 0;
            height: 0;
        }

        .connections-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ============================================
           SECTION 6: البطاقات (Cards)
           ============================================ */
        .card {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            min-width: 260px;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            z-index: 10;
        }

        .card.dragging {
            opacity: 0.9;
            transform: scale(1.02);
            z-index: 1000;
        }

        .card.minimized {
            min-width: 180px;
        }

        .card.minimized .card-body {
            display: none;
        }

        .card.pinned {
            border-color: var(--warning);
        }

        /* رأس البطاقة */
        .card-header {
            padding: 12px 14px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), transparent);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            opacity: 0.6;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .action-btn {
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            color: var(--text-gray);
            font-size: 0.8rem;
        }

        .action-btn:active {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        /* جسم البطاقة */
        .card-body {
            padding: 14px;
            flex: 1;
            max-height: 280px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* تذييل البطاقة */
        .card-footer {
            padding: 8px 14px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-light);
        }

        /* ============================================
           SECTION 7: مكونات القوائم (Todo)
           ============================================ */
        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .todo-check {
            width: 18px;
            height: 18px;
            border: 2px solid var(--primary);
            border-radius: 5px;
            cursor: pointer;
            appearance: none;
            flex-shrink: 0;
        }

        .todo-check:checked {
            background: var(--primary);
            position: relative;
        }

        .todo-check:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 11px;
        }

        .todo-text {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-dark);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            padding: 4px;
        }

        .todo-text:focus {
            outline: none;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 6px;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* ============================================
           SECTION 8: البومودورو (Pomodoro)
           ============================================ */
        .pomodoro-container {
            text-align: center;
        }

        .pomodoro-timer {
            font-size: 2.5rem;
            font-family: monospace;
            text-align: center;
            margin: 16px 0;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .pomodoro-timer.work {
            color: var(--pomodoro-color);
            background: linear-gradient(135deg, var(--pomodoro-color), #fdba74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pomodoro-timer.break {
            color: var(--break-color);
            background: linear-gradient(135deg, var(--break-color), #86efac);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pomodoro-progress {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .pomodoro-progress-bar {
            height: 100%;
            transition: width 1s linear;
        }

        .pomodoro-progress-bar.work {
            background: linear-gradient(90deg, var(--pomodoro-color), #fdba74);
        }

        .pomodoro-progress-bar.break {
            background: linear-gradient(90deg, var(--break-color), #86efac);
        }

        .pomodoro-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .pomodoro-stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.75rem;
            color: var(--text-gray);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-number {
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
        }

        /* ============================================
           SECTION 9: المؤقت العادي (Stopwatch)
           ============================================ */
        .timer-display {
            font-size: 2rem;
            font-family: monospace;
            text-align: center;
            margin: 12px 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .timer-progress {
            width: 100%;
            height: 3px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .timer-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 1s linear;
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-sm:active {
            transform: scale(0.96);
            background: var(--primary);
            color: white;
        }

        .btn-pomodoro {
            background: rgba(249, 115, 22, 0.1);
            color: var(--pomodoro-color);
        }

        .btn-pomodoro:active {
            background: var(--pomodoro-color);
            color: white;
        }

        /* ============================================
           SECTION 10: الإشعارات (Toast)
           ============================================ */
        .toast-container {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            width: calc(100% - 32px);
            max-width: 350px;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
            font-size: 0.85rem;
        }

        .toast.success { border-right: 3px solid var(--success); }
        .toast.error { border-right: 3px solid var(--danger); }
        .toast.pomodoro { border-right: 3px solid var(--pomodoro-color); }

        /* ============================================
           SECTION 11: قائمة السياق (Context Menu)
           ============================================ */
        .context-menu {
            position: fixed;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 6px;
            min-width: 160px;
            z-index: 10000;
            display: none;
            box-shadow: var(--shadow-sm);
        }

        .context-item {
            padding: 10px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .context-item:active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        /* ============================================
           SECTION 12: النافذة المنبثقة (Modal)
           ============================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 10002;
            display: none;
            place-items: center;
            padding: 20px;
        }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .shortcut-key {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
        }

        /* ============================================
           SECTION 13: الرسوم المتحركة
           ============================================ */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pomodoro-complete {
            animation: pulse 0.5s ease;
        }

        /* ============================================
           SECTION 14: تحسينات الموبايل
           ============================================ */
        @media (max-width: 480px) {
            .card {
                min-width: 240px;
            }
            .pomodoro-timer {
                font-size: 2rem;
            }
            .timer-display {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
         شريط التنقل
         ============================================ -->
    <div class="ui-layer">
        <nav class="navbar">
            <div class="brand" id="resetViewBtn">
                <svg width="32" height="32" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#ec489a"/>
                        </linearGradient>
                    </defs>
                    <rect x="8" y="8" width="56" height="56" rx="18" stroke="url(#grad)" stroke-width="2" fill="none"/>
                    <path d="M16 42 C24 20, 34 20, 42 38 S54 52, 56 30" stroke="url(#grad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                    <circle cx="16" cy="42" r="3" fill="#6366f1"/>
                    <circle cx="42" cy="38" r="3" fill="#ec489a"/>
                    <circle cx="56" cy="30" r="3" fill="#6366f1"/>
                </svg>
                <span>MindfulSpace</span>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="بحث...">
                <i class="fa-solid fa-search"></i>
            </div>

            <div class="tools">
                <button class="tool-btn" id="undoBtn"><i class="fa-solid fa-rotate-left"></i></button>
                <button class="tool-btn" id="redoBtn"><i class="fa-solid fa-rotate-right"></i></button>
                <button class="tool-btn" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
                <button class="tool-btn" id="exportBtn"><i class="fa-solid fa-download"></i></button>
            </div>
        </nav>
    </div>

    <!-- ============================================
         زر الإجراءات العائم
         ============================================ -->
    <div class="fab-container" id="fabContainer">
        <div class="fab-options">
            <div class="fab-item" data-type="note"><i class="fa-regular fa-note-sticky"></i><span>ملاحظة</span></div>
            <div class="fab-item" data-type="todo"><i class="fa-solid fa-list-check"></i><span>مهام</span></div>
            <div class="fab-item" data-type="pomodoro"><i class="fa-solid fa-clock"></i><span>بومودورو</span></div>
            <div class="fab-item" data-type="stopwatch"><i class="fa-solid fa-stopwatch"></i><span>ساعة</span></div>
        </div>
        <button class="fab-main" id="fabBtn"><i class="fa-solid fa-plus"></i></button>
    </div>

    <!-- ============================================
         منطقة العمل
         ============================================ -->
    <div id="viewport">
        <svg class="connections-layer" id="connectionsLayer"></svg>
        <div id="world"></div>
    </div>

    <!-- ============================================
         قائمة السياق
         ============================================ -->
    <div class="context-menu" id="contextMenu">
        <div class="context-item" data-action="pin"><i class="fa-solid fa-thumbtack"></i><span>تثبيت</span></div>
        <div class="context-item" data-action="duplicate"><i class="fa-solid fa-copy"></i><span>نسخ</span></div>
        <div class="context-item" data-action="delete"><i class="fa-solid fa-trash"></i><span>حذف</span></div>
    </div>

    <!-- ============================================
         الإشعارات
         ============================================ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================
         نافذة الاختصارات
         ============================================ -->
    <div class="modal-overlay" id="shortcutsModal">
        <div class="modal">
            <h3 style="margin-bottom: 16px;">⌨️ اختصارات</h3>
            <div class="shortcut-item"><span>عنصر جديد</span><span class="shortcut-key">N</span></div>
            <div class="shortcut-item"><span>تراجع</span><span class="shortcut-key">⌘Z</span></div>
            <div class="shortcut-item"><span>إعادة</span><span class="shortcut-key">⌘Y</span></div>
            <div class="shortcut-item"><span>حذف</span><span class="shortcut-key">Delete</span></div>
            <button class="btn-sm" onclick="closeModal()" style="width:100%; margin-top:16px;">إغلاق</button>
        </div>
    </div>

    <script>
        // ============================================
        // الحالة العامة للتطبيق
        // ============================================
        const App = {
            cards: [],
            view: { x: 0, y: 0, scale: 1 },
            nextId: Date.now(),
            selectedId: null,
            theme: localStorage.getItem('theme') || 'light',
            searchQuery: ''
        };

        // ============================================
        // إدارة السجل (Undo/Redo)
        // ============================================
        const History = {
            stack: [],
            index: -1,

            save() {
                const state = {
                    cards: JSON.parse(JSON.stringify(App.cards)),
                    view: { ...App.view }
                };

                if (this.index < this.stack.length - 1) {
                    this.stack = this.stack.slice(0, this.index + 1);
                }

                this.stack.push(state);
                this.index++;

                if (this.stack.length > 50) {
                    this.stack.shift();
                    this.index--;
                }

                localStorage.setItem('cards', JSON.stringify(App.cards));
                localStorage.setItem('view', JSON.stringify(App.view));
            },

            undo() {
                if (this.index > 0) {
                    this.index--;
                    this.restore(this.stack[this.index]);
                    showToast('تم التراجع');
                }
            },

            redo() {
                if (this.index < this.stack.length - 1) {
                    this.index++;
                    this.restore(this.stack[this.index]);
                    showToast('تمت الإعادة');
                }
            },

            restore(state) {
                App.cards = JSON.parse(JSON.stringify(state.cards));
                App.view = { ...state.view };
                renderAll();
                applyView();
            }
        };

        // ============================================
        // دوال مساعدة
        // ============================================
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : type === 'pomodoro' ? 'fa-clock' : 'fa-info-circle'}"></i><span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function formatTime(sec) {
            const mins = Math.floor(sec / 60);
            const remainingSecs = sec % 60;
            return `${mins.toString().padStart(2, '0')}:${remainingSecs.toString().padStart(2, '0')}`;
        }

        function formatDate(ts) {
            return new Date(ts).toLocaleString('ar-EG', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' });
        }

        function applyView() {
            const t = `translate(${App.view.x}px, ${App.view.y}px) scale(${App.view.scale})`;
            document.getElementById('world').style.transform = t;
            document.getElementById('connectionsLayer').style.transform = t;
        }

        function resetView() {
            App.view = { x: 0, y: 0, scale: 1 };
            applyView();
            showToast('تم إعادة ضبط العرض');
        }

        // ============================================
        // إنشاء وعرض البطاقات
        // ============================================
        function createCard(type) {
            const vp = document.getElementById('viewport');
            const rect = vp.getBoundingClientRect();
            const x = (-App.view.x + rect.width / 2) / App.view.scale + (Math.random() - 0.5) * 80;
            const y = (-App.view.y + rect.height / 2) / App.view.scale + (Math.random() - 0.5) * 80;

            const titles = {
                note: '📝 ملاحظة',
                todo: '✓ مهام',
                pomodoro: '🍅 بومودورو',
                stopwatch: '⏱️ ساعة'
            };

            let card = {
                id: App.nextId++,
                type: type,
                x: x, y: y,
                title: titles[type],
                pinned: false,
                minimized: false,
                createdAt: Date.now()
            };

            if (type === 'note') {
                card.content = '';
            } else if (type === 'todo') {
                card.data = [];
            } else if (type === 'pomodoro') {
                card.data = {
                    mode: 'work',
                    workTime: 25 * 60,
                    breakTime: 5 * 60,
                    time: 25 * 60,
                    active: false,
                    sessions: 0,
                    totalFocusTime: 0
                };
            } else if (type === 'stopwatch') {
                card.data = {
                    time: 0,
                    active: false
                };
            }

            App.cards.push(card);
            renderCard(card);
            History.save();
            showToast('تم الإنشاء', 'success');

            document.getElementById('fabContainer').classList.remove('open');
            document.getElementById('fabBtn').classList.remove('active');
        }

        function renderCard(card) {
            const existing = document.getElementById(`card-${card.id}`);
            if (existing) existing.remove();

            const el = document.createElement('div');
            el.className = `card ${card.pinned ? 'pinned' : ''} ${card.minimized ? 'minimized' : ''}`;
            el.id = `card-${card.id}`;
            el.style.transform = `translate(${card.x}px, ${card.y}px)`;

            const icons = {
                note: 'fa-note-sticky',
                todo: 'fa-list-check',
                pomodoro: 'fa-clock',
                stopwatch: 'fa-stopwatch'
            };

            el.innerHTML = `
                <div class="card-header">
                    <div class="card-title"><i class="fa-regular ${icons[card.type]}"></i><span>${card.title}</span></div>
                    <div class="card-actions">
                        <i class="fa-solid fa-minus action-btn" onclick="toggleMinimize(${card.id})"></i>
                        <i class="fa-solid fa-thumbtack action-btn" onclick="togglePin(${card.id})"></i>
                        <i class="fa-regular fa-trash-can action-btn" onclick="deleteCard(${card.id})"></i>
                    </div>
                </div>
                <div class="card-body" id="body-${card.id}"></div>
                <div class="card-footer">
                    <span>${formatDate(card.createdAt)}</span>
                </div>
            `;

            document.getElementById('world').appendChild(el);

            const body = document.getElementById(`body-${card.id}`);

            if (card.type === 'note') {
                body.innerHTML = `<div contenteditable="true" style="min-height:100px; outline:none;">${card.content || ''}</div>`;
                body.querySelector('div').addEventListener('input', e => {
                    card.content = e.target.innerHTML;
                    History.save();
                });
            }
            else if (card.type === 'todo') {
                if (!card.data) card.data = [];
                const renderTodos = () => {
                    body.innerHTML = '';
                    if (card.data.length === 0) {
                        body.innerHTML = '<div style="text-align:center; color:var(--text-light); padding:20px;">✨ أضف مهامك هنا</div>';
                    }
                    card.data.forEach((todo, i) => {
                        const div = document.createElement('div');
                        div.className = `todo-item ${todo.done ? 'completed' : ''}`;
                        div.innerHTML = `
                            <input type="checkbox" class="todo-check" ${todo.done ? 'checked' : ''}>
                            <input type="text" class="todo-text" value="${todo.text || ''}" placeholder="مهمة...">
                            <i class="fa-solid fa-times" style="cursor:pointer; opacity:0.4"></i>
                        `;
                        div.querySelector('.todo-check').onchange = e => {
                            todo.done = e.target.checked;
                            div.classList.toggle('completed');
                            History.save();
                        };
                        div.querySelector('.todo-text').onchange = e => {
                            todo.text = e.target.value;
                            History.save();
                        };
                        div.querySelector('.fa-times').onclick = () => {
                            card.data.splice(i, 1);
                            renderTodos();
                            History.save();
                        };
                        body.appendChild(div);
                    });
                    const btn = document.createElement('button');
                    btn.className = 'btn-sm';
                    btn.style.cssText = 'width:100%; margin-top:8px';
                    btn.innerHTML = '<i class="fa-solid fa-plus"></i> إضافة مهمة';
                    btn.onclick = () => {
                        card.data.push({ text: '', done: false });
                        renderTodos();
                    };
                    body.appendChild(btn);
                };
                renderTodos();
            }
            else if (card.type === 'pomodoro') {
                const data = card.data;
                const updatePomodoroDisplay = () => {
                    const timerDiv = body.querySelector('.pomodoro-timer');
                    const progressBar = body.querySelector('.pomodoro-progress-bar');
                    if (timerDiv) {
                        timerDiv.textContent = formatTime(data.time);
                        timerDiv.className = `pomodoro-timer ${data.mode}`;
                    }
                    if (progressBar) {
                        const totalTime = data.mode === 'work' ? data.workTime : data.breakTime;
                        const progress = ((totalTime - data.time) / totalTime) * 100;
                        progressBar.style.width = `${progress}%`;
                        progressBar.className = `pomodoro-progress-bar ${data.mode}`;
                    }
                    const statsDiv = body.querySelector('.pomodoro-stats');
                    if (statsDiv) {
                        const focusHours = Math.floor(data.totalFocusTime / 3600);
                        const focusMins = Math.floor((data.totalFocusTime % 3600) / 60);
                        statsDiv.innerHTML = `
                            <div class="stat-item"><i class="fa-solid fa-fire"></i><span class="stat-number">${data.sessions}</span><span>جلسة</span></div>
                            <div class="stat-item"><i class="fa-solid fa-hourglass-half"></i><span class="stat-number">${focusHours > 0 ? focusHours + 'س' : focusMins + 'د'}</span><span>تركيز</span></div>
                        `;
                    }
                };

                body.innerHTML = `
                    <div class="pomodoro-container">
                        <div class="pomodoro-progress">
                            <div class="pomodoro-progress-bar ${data.mode}" style="width: 0%"></div>
                        </div>
                        <div class="pomodoro-timer ${data.mode}">${formatTime(data.time)}</div>
                        <div class="pomodoro-controls">
                            <button class="btn-sm pomodoro-toggle"><i class="fa-solid ${data.active ? 'fa-pause' : 'fa-play'}"></i> ${data.active ? 'إيقاف' : 'بدء'}</button>
                            <button class="btn-sm pomodoro-reset"><i class="fa-solid fa-rotate-right"></i> إعادة</button>
                            <button class="btn-sm btn-pomodoro pomodoro-skip"><i class="fa-solid fa-forward"></i> تخطي</button>
                        </div>
                        <div class="pomodoro-stats">
                            <div class="stat-item"><i class="fa-solid fa-fire"></i><span class="stat-number">${data.sessions}</span><span>جلسة</span></div>
                            <div class="stat-item"><i class="fa-solid fa-hourglass-half"></i><span class="stat-number">0</span><span>تركيز</span></div>
                        </div>
                    </div>
                `;

                updatePomodoroDisplay();

                body.querySelector('.pomodoro-toggle').onclick = () => {
                    data.active = !data.active;
                    const toggleBtn = body.querySelector('.pomodoro-toggle');
                    toggleBtn.innerHTML = `<i class="fa-solid ${data.active ? 'fa-pause' : 'fa-play'}"></i> ${data.active ? 'إيقاف' : 'بدء'}`;
                    History.save();
                };

                body.querySelector('.pomodoro-reset').onclick = () => {
                    data.active = false;
                    data.time = data.mode === 'work' ? data.workTime : data.breakTime;
                    updatePomodoroDisplay();
                    const toggleBtn = body.querySelector('.pomodoro-toggle');
                    toggleBtn.innerHTML = '<i class="fa-solid fa-play"></i> بدء';
                    History.save();
                };

                body.querySelector('.pomodoro-skip').onclick = () => {
                    data.active = false;
                    completePomodoroSession(card);
                };
            }
            else if (card.type === 'stopwatch') {
                const data = card.data;
                const updateStopwatchDisplay = () => {
                    const display = body.querySelector('.timer-display');
                    if (display) display.textContent = formatTime(data.time);
                };

                body.innerHTML = `
                    <div class="timer-display">${formatTime(data.time)}</div>
                    <div class="timer-controls">
                        <button class="btn-sm stopwatch-toggle"><i class="fa-solid fa-play"></i> بدء</button>
                        <button class="btn-sm stopwatch-reset"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                `;

                body.querySelector('.stopwatch-toggle').onclick = () => {
                    data.active = !data.active;
                    const btn = body.querySelector('.stopwatch-toggle');
                    btn.innerHTML = `<i class="fa-solid ${data.active ? 'fa-pause' : 'fa-play'}"></i> ${data.active ? 'إيقاف' : 'بدء'}`;
                    History.save();
                };

                body.querySelector('.stopwatch-reset').onclick = () => {
                    data.active = false;
                    data.time = 0;
                    updateStopwatchDisplay();
                    const btn = body.querySelector('.stopwatch-toggle');
                    btn.innerHTML = '<i class="fa-solid fa-play"></i> بدء';
                    History.save();
                };
            }

            setupDrag(el, card);

            el.oncontextmenu = e => {
                e.preventDefault();
                showContextMenu(e, card.id);
            };
        }

        function completePomodoroSession(card) {
            const data = card.data;
            const wasWork = data.mode === 'work';

            if (wasWork) {
                data.sessions++;
                data.totalFocusTime += data.workTime;
                showToast(`🎉 رائع! أكملت ${data.sessions} جلسات بومودورو`, 'success');
            }

            data.mode = wasWork ? 'break' : 'work';
            data.time = wasWork ? data.breakTime : data.workTime;
            data.active = false;

            const msg = wasWork ? '🍵 وقت الاستراحة! استرخِ قليلاً' : '🍅 استعد للعمل! ابدأ جلسة جديدة';
            showToast(msg, 'pomodoro');

            renderCard(card);

            // تأثير صوتي بسيط
            try {
                const audio = new Audio();
                // يمكن إضافة صوت هنا
            } catch(e) {}
        }

        function setupDrag(el, card) {
            const header = el.querySelector('.card-header');
            let dragging = false, startX, startY, initX, initY;

            const startDrag = e => {
                if (e.target.closest('.card-actions')) return;
                dragging = true;
                const cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                startX = cx; startY = cy;
                initX = card.x; initY = card.y;
                el.classList.add('dragging');
                e.preventDefault();
            };

            const dragMove = e => {
                if (!dragging) return;
                const cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                card.x = initX + (cx - startX) / App.view.scale;
                card.y = initY + (cy - startY) / App.view.scale;
                el.style.transform = `translate(${card.x}px, ${card.y}px)`;
            };

            const endDrag = () => {
                if (dragging) {
                    dragging = false;
                    el.classList.remove('dragging');
                    History.save();
                }
            };

            header.addEventListener('mousedown', startDrag);
            header.addEventListener('touchstart', startDrag);
            window.addEventListener('mousemove', dragMove);
            window.addEventListener('touchmove', dragMove);
            window.addEventListener('mouseup', endDrag);
            window.addEventListener('touchend', endDrag);
        }

        function renderAll() {
            document.getElementById('world').innerHTML = '';
            App.cards.forEach(c => renderCard(c));
        }

        // ============================================
        // إجراءات البطاقات
        // ============================================
        function togglePin(id) {
            const c = App.cards.find(c => c.id === id);
            if (c) { c.pinned = !c.pinned; renderCard(c); History.save(); }
        }

        function toggleMinimize(id) {
            const c = App.cards.find(c => c.id === id);
            if (c) { c.minimized = !c.minimized; renderCard(c); }
        }

        function deleteCard(id) {
            if (!confirm('حذف العنصر؟')) return;
            App.cards = App.cards.filter(c => c.id !== id);
            renderAll();
            History.save();
            showToast('تم الحذف');
        }

        function duplicateCard(id) {
            const c = App.cards.find(c => c.id === id);
            if (c) {
                const newCard = JSON.parse(JSON.stringify(c));
                newCard.id = App.nextId++;
                newCard.x += 40;
                newCard.y += 40;
                newCard.pinned = false;
                newCard.createdAt = Date.now();
                if (newCard.type === 'pomodoro' && newCard.data) {
                    newCard.data.active = false;
                }
                if (newCard.type === 'stopwatch' && newCard.data) {
                    newCard.data.active = false;
                }
                App.cards.push(newCard);
                renderCard(newCard);
                History.save();
                showToast('تم النسخ');
            }
        }

        function showContextMenu(e, id) {
            const menu = document.getElementById('contextMenu');
            menu.dataset.id = id;
            menu.style.display = 'block';
            menu.style.left = `${Math.min(e.clientX, window.innerWidth - 160)}px`;
            menu.style.top = `${Math.min(e.clientY, window.innerHeight - 120)}px`;
        }

        // ============================================
        // تحديث المؤقتات
        // ============================================
        function updateTimers() {
            App.cards.forEach(card => {
                if (card.type === 'stopwatch' && card.data.active) {
                    card.data.time++;
                    const display = document.querySelector(`#body-${card.id} .timer-display`);
                    if (display) display.textContent = formatTime(card.data.time);
                }
                else if (card.type === 'pomodoro' && card.data.active && card.data.time > 0) {
                    card.data.time--;
                    const timerDiv = document.querySelector(`#body-${card.id} .pomodoro-timer`);
                    const progressBar = document.querySelector(`#body-${card.id} .pomodoro-progress-bar`);
                    if (timerDiv) {
                        timerDiv.textContent = formatTime(card.data.time);
                    }
                    if (progressBar) {
                        const totalTime = card.data.mode === 'work' ? card.data.workTime : card.data.breakTime;
                        const progress = ((totalTime - card.data.time) / totalTime) * 100;
                        progressBar.style.width = `${progress}%`;
                    }

                    if (card.data.time === 0) {
                        card.data.active = false;
                        completePomodoroSession(card);
                    }
                }
            });
        }

        // ============================================
        // البحث والتصفية
        // ============================================
        function filterCards() {
            const q = App.searchQuery.toLowerCase();
            document.querySelectorAll('.card').forEach(el => {
                const id = parseInt(el.id.replace('card-', ''));
                const card = App.cards.find(c => c.id === id);
                const match = !q || card.title.toLowerCase().includes(q) || (card.content && card.content.toLowerCase().includes(q));
                el.style.opacity = match ? '1' : '0.3';
                el.style.pointerEvents = match ? 'auto' : 'none';
            });
        }

        // ============================================
        // تصدير البيانات
        // ============================================
        function exportData() {
            const data = { cards: App.cards, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mindfulspace_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('تم التصدير', 'success');
        }

        function closeModal() {
            document.getElementById('shortcutsModal').style.display = 'none';
        }

        // ============================================
        // التفاعلات (Pan & Zoom)
        // ============================================
        function setupCanvas() {
            const viewport = document.getElementById('viewport');
            const world = document.getElementById('world');
            let panning = false, startX, startY, initX, initY;

            const getPos = e => ({ x: e.clientX || (e.touches ? e.touches[0].clientX : 0), y: e.clientY || (e.touches ? e.touches[0].clientY : 0) });

            viewport.onmousedown = e => {
                if (e.target === viewport || e.target === world) {
                    panning = true;
                    const p = getPos(e);
                    startX = p.x; startY = p.y;
                    initX = App.view.x; initY = App.view.y;
                    viewport.style.cursor = 'grabbing';
                }
            };

            window.onmousemove = e => {
                if (!panning) return;
                const p = getPos(e);
                App.view.x = initX + (p.x - startX);
                App.view.y = initY + (p.y - startY);
                applyView();
            };

            window.onmouseup = () => {
                if (panning) { panning = false; viewport.style.cursor = 'grab'; History.save(); }
            };

            viewport.addEventListener('touchstart', e => {
                if (e.target === viewport || e.target === world) {
                    panning = true;
                    const p = getPos(e);
                    startX = p.x; startY = p.y;
                    initX = App.view.x; initY = App.view.y;
                }
            });

            viewport.addEventListener('wheel', e => {
                e.preventDefault();
                const delta = -e.deltaY * 0.002;
                const newScale = Math.min(Math.max(0.5, App.view.scale + delta), 2);
                const rect = viewport.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const wx = (mx - App.view.x) / App.view.scale;
                const wy = (my - App.view.y) / App.view.scale;
                App.view.x = mx - wx * newScale;
                App.view.y = my - wy * newScale;
                App.view.scale = newScale;
                applyView();
            });
        }

        // ============================================
        // التهيئة والتشغيل
        // ============================================
        function init() {
            // تحميل البيانات
            const saved = localStorage.getItem('cards');
            const savedView = localStorage.getItem('view');

            if (saved) {
                try {
                    App.cards = JSON.parse(saved);
                    App.nextId = Math.max(...App.cards.map(c => c.id), 0) + 1;
                } catch(e) {}
            }
            if (savedView) {
                try {
                    App.view = JSON.parse(savedView);
                } catch(e) {}
            }

            // تحميل الثيم
            document.documentElement.setAttribute('data-theme', App.theme);

            renderAll();
            applyView();
            setupCanvas();

            // الأحداث
            document.getElementById('themeBtn').onclick = () => {
                App.theme = App.theme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', App.theme);
                localStorage.setItem('theme', App.theme);
                showToast(App.theme === 'dark' ? 'وضع ليلي 🌙' : 'وضع نهاري ☀️');
            };

            document.getElementById('undoBtn').onclick = () => History.undo();
            document.getElementById('redoBtn').onclick = () => History.redo();
            document.getElementById('exportBtn').onclick = () => exportData();
            document.getElementById('resetViewBtn').onclick = () => resetView();

            document.getElementById('searchInput').oninput = e => {
                App.searchQuery = e.target.value;
                filterCards();
            };

            // FAB
            const fabBtn = document.getElementById('fabBtn');
            const fabContainer = document.getElementById('fabContainer');
            fabBtn.onclick = () => fabContainer.classList.toggle('open');
            document.querySelectorAll('.fab-item').forEach(item => {
                item.onclick = () => createCard(item.dataset.type);
            });

            // Context menu
            document.querySelectorAll('.context-item').forEach(item => {
                item.onclick = e => {
                    const id = parseInt(document.getElementById('contextMenu').dataset.id);
                    const action = e.currentTarget.dataset.action;
                    if (action === 'pin') togglePin(id);
                    if (action === 'duplicate') duplicateCard(id);
                    if (action === 'delete') deleteCard(id);
                    document.getElementById('contextMenu').style.display = 'none';
                };
            });

            document.addEventListener('click', e => {
                if (!e.target.closest('.context-menu')) {
                    document.getElementById('contextMenu').style.display = 'none';
                }
                if (!e.target.closest('.fab-container')) {
                    fabContainer.classList.remove('open');
                }
            });

            // اختصارات
            document.addEventListener('keydown', e => {
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); History.undo(); }
                if (e.ctrlKey && e.key === 'y') { e.preventDefault(); History.redo(); }
                if (e.key === 'Delete') {
                    if (App.selectedId) deleteCard(App.selectedId);
                }
                if (e.key === 'n' || e.key === 'N') {
                    if (document.activeElement?.tagName !== 'INPUT') fabBtn.click();
                }
            });

            // مؤقت
            setInterval(updateTimers, 1000);

            History.save();
            showToast('مرحبًا بك في MindfulSpace! 🌟', 'success');}

        // تشغيل التطبيق
        init();
    </script>
</body>
</html>
